name: Scrape

on:
    workflow_dispatch:
    schedule:
        # Every 4 hours during playoff season; keepalive handles off-season
        - cron: "16 4/4 * * *"

permissions:
    contents: write
    actions: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Prevents GitHub from disabling this workflow after 60 days of inactivity.
            # During the off-season the cron still fires but only this step does real work.
            - name: Keep workflow alive
              uses: gautamkrishnar/keepalive-workflow@v2

            - name: Check if NBA playoff season (April–June)
              id: season
              run: |
                  month=$(date +%-m)
                  if [ "$month" -ge 4 ] && [ "$month" -le 6 ]; then
                      echo "in_season=true" >> $GITHUB_OUTPUT
                      echo "In playoff season (month=$month), running scrape."
                  else
                      echo "in_season=false" >> $GITHUB_OUTPUT
                      echo "Off-season (month=$month), skipping scrape."
                  fi

            - uses: actions/setup-node@v4
              if: steps.season.outputs.in_season == 'true' || github.event_name == 'workflow_dispatch'
              with:
                  node-version: 20
                  cache: "yarn"

            - name: Install dependencies
              if: steps.season.outputs.in_season == 'true' || github.event_name == 'workflow_dispatch'
              run: yarn install

            - name: Scrape and commit
              if: steps.season.outputs.in_season == 'true' || github.event_name == 'workflow_dispatch'
              run: |
                  node functions/scraper/scraper-cli.js
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "GitHub Actions [bot]"
                  git add .
                  git commit -m "[bot] Scrape" || true

            - name: Push changes
              if: steps.season.outputs.in_season == 'true' || github.event_name == 'workflow_dispatch'
              uses: ad-m/github-push-action@master
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
